<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 맛집 — Jeju Food Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1c1c1a; --stone:#f5f2ed; --sand:#e8e3da;
  --rust:#c04e28; --sage:#3d6b5e; --gold:#a8874a;
  --muted:#8a8780; --white:#fdfcfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--stone);color:var(--ink);font-family:'Noto Sans KR',sans-serif;}

/* 헤더 */
.site-header{
  position:sticky;top:0;z-index:100;
  background:rgba(245,242,237,0.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--sand);
  padding:0 20px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--ink);text-decoration:none;}
.logo span{color:var(--rust);font-style:italic;}
/* Google Translate 위젯 스타일 */
#google_translate_element .goog-te-gadget-simple {
  background:transparent !important;
  border:1px solid var(--sand) !important;
  border-radius:20px !important;
  padding:4px 10px !important;
  font-size:12px !important;
}
#google_translate_element .goog-te-gadget-simple span,
#google_translate_element .goog-te-gadget-simple a {
  color:var(--muted) !important;
  text-decoration:none !important;
  font-family:'Noto Sans KR',sans-serif !important;
}
.goog-te-banner-frame { display:none !important; }
body { top: 0 !important; }
.skiptranslate { display:none !important; }

/* 히어로 */
.hero{
  padding:36px 20px 28px;text-align:center;
  background:linear-gradient(160deg,var(--white) 0%,var(--stone) 100%);
}
.hero-eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--rust);margin-bottom:10px;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,44px);line-height:1.2;margin-bottom:10px;}
.hero-title em{color:var(--rust);font-style:italic;}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.8;}

/* 검색 패널 */
.search-panel{
  background:var(--white);margin:20px;border-radius:20px;
  padding:24px;border:1px solid var(--sand);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.panel-section{margin-bottom:20px;}
.panel-label{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  padding:8px 16px;border-radius:100px;
  border:1.5px solid var(--sand);background:var(--stone);
  font-size:13px;color:var(--ink);cursor:pointer;
  transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;
  white-space:nowrap;
}
.chip:hover{border-color:var(--rust);color:var(--rust);}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--white);}
.search-btn{
  width:100%;padding:14px;background:var(--rust);
  color:var(--white);border:none;border-radius:14px;
  font-size:15px;font-weight:600;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.03em;
}
.search-btn:hover{background:#a33e1e;box-shadow:0 6px 20px rgba(192,78,40,0.3);}
.search-btn:active{transform:scale(0.98);}

/* SVG 지도 */
.map-section{
  margin:0 20px 24px;background:var(--white);
  border-radius:20px;border:1px solid var(--sand);
  padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.04);
}
.map-section-label{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;text-align:center;
}
.map-section svg{width:100%;height:auto;display:block;}
.rg{cursor:pointer;}
.rg-fill{transition:opacity 0.2s;}
.rg:hover .rg-fill{opacity:0.8 !important;}
.rg.on .rg-fill{opacity:1 !important;}
.rg-name{font-size:11px;font-weight:500;pointer-events:none;font-family:'Noto Sans KR',sans-serif;}
.rg-en{font-size:9px;pointer-events:none;font-family:'Noto Sans KR',sans-serif;}
.rg.on .rg-name{font-weight:700;}

/* 결과 */
.result-bar{
  display:none;align-items:center;justify-content:space-between;
  padding:8px 20px 14px;
}
.result-title{font-family:'Cormorant Garamond',serif;font-size:20px;}
.result-count{font-size:12px;color:var(--muted);background:var(--sand);padding:4px 12px;border-radius:20px;}

/* 카드 그리드 */
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:0 20px 110px;}
.food-card{
  background:var(--white);border-radius:16px;overflow:hidden;
  border:1px solid var(--sand);cursor:pointer;transition:all 0.22s;
}
.food-card:hover{transform:translateY(-4px);box-shadow:0 14px 36px rgba(0,0,0,0.09);border-color:transparent;}
.food-img{width:100%;height:175px;object-fit:cover;display:block;background:var(--sand);}
.food-ph{width:100%;height:175px;background:linear-gradient(135deg,var(--sand),var(--gold));display:flex;align-items:center;justify-content:center;font-size:44px;}
.food-body{padding:14px;}
.food-region{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--rust);margin-bottom:4px;}
.food-name{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.4;}
.food-addr{font-size:11px;color:var(--muted);line-height:1.5;}
.food-tag{font-size:10px;padding:2px 9px;border-radius:100px;background:var(--stone);color:var(--muted);display:inline-block;margin:4px 3px 0 0;}
.empty{text-align:center;padding:64px 24px;color:var(--muted);grid-column:1/-1;}

/* 상세 오버레이 */
.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:300;background:var(--white);
  transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  overflow-y:auto;
}
.overlay.open{transform:translateX(0);}
.overlay-nav{
  position:sticky;top:0;z-index:10;
  background:rgba(253,252,250,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--sand);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
}
.back-btn{background:none;border:none;cursor:pointer;font-size:14px;color:var(--ink);font-family:'Noto Sans KR',sans-serif;}
.d-img{width:100%;height:240px;object-fit:cover;display:block;}
.d-img-ph{width:100%;height:240px;background:linear-gradient(135deg,var(--sand),var(--gold));display:flex;align-items:center;justify-content:center;font-size:72px;}
.d-body{padding:22px 20px 40px;max-width:680px;}
.d-region{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--rust);margin-bottom:6px;}
.d-name{font-family:'Cormorant Garamond',serif;font-size:26px;line-height:1.25;margin-bottom:10px;}
.d-addr{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:10px;}
.d-tel{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--sage);font-weight:500;text-decoration:none;}
.divider{height:1px;background:var(--sand);margin:18px 0;}
.c-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:100px;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-decoration:none;border:none;transition:all 0.2s;}
.c-btn-naver{background:#03C75A;color:white;}
.c-btn-naver:hover{background:#02a84a;}
.c-btn-msg{background:var(--ink);color:white;}
.c-btn-msg:hover{background:#333;}
.c-btn-kakao{background:#FEE500;color:#391B1B;}
.c-btn-kakao:hover{background:#f0d800;}
.map-label{font-size:12px;font-weight:600;margin-bottom:10px;}
.d-map{width:100%;height:260px;border-radius:14px;border:none;box-shadow:0 4px 16px rgba(0,0,0,0.08);display:block;}
.map-ext{display:block;text-align:center;margin-top:10px;font-size:12px;color:var(--sage);text-decoration:none;}

/* 하단 네비 */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(253,252,250,0.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--sand);
  display:flex;justify-content:space-around;
  padding:10px 0 16px;
}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;}
.nav-btn.active{color:var(--rust);}
.nav-icon{font-size:20px;}

@media(max-width:600px){
  .food-grid{grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 110px;}
  .food-img,.food-ph{height:140px;}
  .search-panel{margin:14px;padding:18px;}
  .map-section{margin:0 14px 20px;}
}
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Jeju <span>Food</span></a>
  <div id="google_translate_element"></div>
</header>

<section class="hero">
  <div class="hero-eyebrow" id="h-eyebrow">Jeju Food Guide</div>
  <h1 class="hero-title"><em id="h-em">진짜 제주 맛</em>을 <span id="h-t2">찾아드립니다</span></h1>
  <p class="hero-sub" id="h-sub">현지인이 사랑하는 식당부터 뷰 맛집까지, 제주 605곳</p>
</section>

<!-- 검색 패널 -->
<div class="search-panel">
  <div class="panel-section">
    <div class="panel-label" id="lbl-region">지 역</div>
    <div class="chips" id="region-chips">
      <button class="chip on" data-v="all" onclick="pickChip(this,'r')">전체</button>
      <button class="chip" data-v="제주시" onclick="pickChip(this,'r')">제주시</button>
      <button class="chip" data-v="서귀포" onclick="pickChip(this,'r')">서귀포</button>
      <button class="chip" data-v="애월" onclick="pickChip(this,'r')">애월</button>
      <button class="chip" data-v="한림" onclick="pickChip(this,'r')">한림</button>
      <button class="chip" data-v="성산" onclick="pickChip(this,'r')">성산</button>
      <button class="chip" data-v="구좌" onclick="pickChip(this,'r')">구좌</button>
      <button class="chip" data-v="조천" onclick="pickChip(this,'r')">조천</button>
      <button class="chip" data-v="중문" onclick="pickChip(this,'r')">중문</button>
      <button class="chip" data-v="안덕" onclick="pickChip(this,'r')">안덕</button>
      <button class="chip" data-v="대정" onclick="pickChip(this,'r')">대정</button>
    </div>
  </div>
  <div class="panel-section">
    <div class="panel-label" id="lbl-theme">테 마</div>
    <div class="chips" id="theme-chips">
      <button class="chip on" data-v="all" onclick="pickChip(this,'t')">전체</button>
      <button class="chip" data-v="해산물" onclick="pickChip(this,'t')">🦞 해산물</button>
      <button class="chip" data-v="흑돼지" onclick="pickChip(this,'t')">🥩 흑돼지</button>
      <button class="chip" data-v="카페·디저트" onclick="pickChip(this,'t')">☕ 카페·디저트</button>
      <button class="chip" data-v="향토음식" onclick="pickChip(this,'t')">🍲 향토음식</button>
      <button class="chip" data-v="고기구이" onclick="pickChip(this,'t')">🔥 고기구이</button>
      <button class="chip" data-v="분위기맛집" onclick="pickChip(this,'t')">✨ 분위기맛집</button>
      <button class="chip" data-v="로컬맛집" onclick="pickChip(this,'t')">📍 로컬맛집</button>
    </div>
  </div>
  <button class="search-btn" id="btn-search" onclick="doSearch()">맛집 찾기</button>
</div>

  <svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg">

      Q 618,110 638,133
      Q 656,155 652,178
      Q 645,202 622,218
      Q 592,238 548,250
      Q 498,262 435,268
      Q 368,274 300,272
      Q 232,270 175,256
      Q 130,244 106,224
      Q 90,208 95,188 Z
    " fill="#d4ede6" stroke="#9cc5ba" stroke-width="2"/>

    <text x="382" y="155" text-anchor="middle" font-size="9" fill="#3d6b5e" font-weight="600" font-family="'Noto Sans KR',sans-serif">한라산</text>

    <!-- ── 지역들 ── -->
    <!-- 제주시 (북중앙) -->
    <g class="rg" id="rg-제주시" onclick="mapPick('제주시')">

      <text x="198" y="126" text-anchor="middle" class="rg-en" fill="#a06040">Aewol</text>

      <text x="118" y="172" text-anchor="middle" class="rg-en" fill="#907040">Hallim</text>
    </g>

      <text x="490" y="96" text-anchor="middle" class="rg-name" fill="#1a3028">조천</text>
      <text x="490" y="110" text-anchor="middle" class="rg-en" fill="#4a7a5e">Jocheon</text>
    </g>
    <!-- 구좌 (동) -->
    <g class="rg" id="rg-구좌" onclick="mapPick('구좌')">
      <ellipse cx="592" cy="136" rx="60" ry="23" class="rg-fill" fill="#7a6aaa" opacity="0.4"/>
      <text x="592" y="132" text-anchor="middle" class="rg-name" fill="#2a1a5a">구좌</text>

      <ellipse cx="390" cy="224" rx="86" ry="28" class="rg-fill" fill="#4a7c6f" opacity="0.4"/>
      <text x="390" y="220" text-anchor="middle" class="rg-name" fill="#1a2e2a">서귀포</text>
      <text x="390" y="234" text-anchor="middle" class="rg-en" fill="#5a8a7e">Seogwipo</text>
    </g>
    <!-- 중문 (남서) -->
    <g class="rg" id="rg-중문" onclick="mapPick('중문')">

<!-- 결과 영역 -->
<div class="result-bar" id="result-bar">
  <div class="result-title" id="result-title"></div>
  <div class="result-count" id="result-count"></div>
</div>
<div class="food-grid" id="food-grid"></div>

<!-- 상세 오버레이 -->
<div class="overlay" id="overlay">
  <div class="overlay-nav">
    <button class="back-btn" id="btn-back" onclick="closeDetail()">← 목록으로</button>
    <span style="font-size:10px;color:var(--muted);letter-spacing:0.12em;">JEJU FOOD</span>
  </div>
  <div id="d-img-wrap"></div>
  <div class="d-body">
    <div class="d-region" id="d-region"></div>
    <div class="d-name" id="d-name"></div>
    <div class="d-addr" id="d-addr"></div>
    <a class="d-tel" id="d-tel" href="#"></a>
    <div class="contact-btns" id="contact-btns" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
      <a class="c-btn c-btn-naver" id="btn-naver" href="#" target="_blank">
        <span>🔍</span><span id="txt-naver">네이버 예약</span>
      </a>
      <button class="c-btn c-btn-msg" onclick="openMsgForm()">
        <span>✉️</span><span id="txt-msg">메시지 보내기</span>
      </button>
      <a class="c-btn c-btn-kakao" id="btn-kakao" href="#" target="_blank">
        <span>💬</span><span id="txt-kakao">카카오맵</span>
      </a>
    </div>
    <!-- 메시지 폼 -->

var lang = 'ko';
var selR = 'all';
var selT = 'all';

// setLang removed - using Google Translate

function pickChip(el, type) {
  var group = type === 'r' ? 'region-chips' : 'theme-chips';
  document.querySelectorAll('#'+group+' .chip').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  if(type === 'r'){
    selR = el.getAttribute('data-v');
    // SVG 하이라이트
    document.querySelectorAll('.rg').forEach(function(g){ g.classList.remove('on'); });
    if(selR !== 'all'){
      var rg = document.getElementById('rg-'+selR);
      if(rg) rg.classList.add('on');
    }
  } else {
    selT = el.getAttribute('data-v');
  }
}

function mapPick(region) {
  selR = region;
  // 칩 동기화
  document.querySelectorAll('#region-chips .chip').forEach(function(c){
    c.classList.toggle('on', c.getAttribute('data-v') === region);
  });
  // SVG 하이라이트
  document.querySelectorAll('.rg').forEach(function(g){ g.classList.remove('on'); });
  var rg = document.getElementById('rg-'+region);
  if(rg) rg.classList.add('on');
  doSearch();
}

function doSearch() {
  var t = T[lang];
  var list = restaurants;
  if(selR !== 'all') list = list.filter(function(r){ return r.region === selR; });
  if(selT !== 'all') list = list.filter(function(r){ return r.themes.indexOf(selT) >= 0; });

  var bar = document.getElementById('result-bar');
  bar.style.display = 'flex';

  var rLabel = (selR === 'all') ? (t.regions['all']) : (t.regions[selR] || selR);
  var tLabel = (selT === 'all') ? '' : ((t.themes[selT]||selT).replace(/^[^ ]+ /,''));
  var title = [rLabel !== t.regions['all'] ? rLabel : '', tLabel].filter(Boolean).join(' ');
  if(!title) title = t.regions['all'] || '전체';
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-count').textContent = list.length + t.countUnit;

  window._filteredList = list;
  renderCards();
  bar.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderCards() {
  var t = T[lang];
  var list = window._filteredList || [];
  var grid = document.getElementById('food-grid');
  if(!list.length){
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = '<div style="font-size:48px;margin-bottom:12px">🍽</div><p>해당 조건의 식당이 없어요</p>';
    grid.innerHTML = '';
    grid.appendChild(empty);
    return;
  }
  grid.innerHTML = '';
  for(var i=0;i<list.length;i++){
    var r = list[i];
    var regionLabel = t.regions[r.region] || r.region;
    var card = document.createElement('div');
    card.className = 'food-card';
    card.setAttribute('onclick','openDetail('+r.id+')');
    if(r.img){
      var im = document.createElement('img');
      im.className = 'food-img';
      im.src = r.img;
      im.loading = 'lazy';
      im.onerror = function(){ this.outerHTML='<div class="food-ph">🍽</div>'; };
      card.appendChild(im);
    } else {
      var ph = document.createElement('div');
      ph.className = 'food-ph';
      ph.textContent = '🍽';
      card.appendChild(ph);
    }
    var body = document.createElement('div');
    body.className = 'food-body';
    body.innerHTML = '<div class="food-region">'+regionLabel+'</div>'
      +'<div class="food-name">'+r.name+'</div>'
      +'<div class="food-addr">'+r.addr+'</div>';
    for(var j=0;j<r.themes.length;j++){
      var tag = document.createElement('span');
      tag.className = 'food-tag';
      tag.textContent = t.themes[r.themes[j]] || r.themes[j];
      body.appendChild(tag);
    }
    card.appendChild(body);
    grid.appendChild(card);
  }
}

function openDetail(id) {
  var r = restaurants.find(function(x){ return x.id === id; });
  var t = T[lang];
  var wrap = document.getElementById('d-img-wrap');
  wrap.innerHTML = '';
  if(r.img){
    var im = document.createElement('img');
    im.className = 'd-img';
    im.src = r.img;
    im.onerror = function(){ this.outerHTML='<div class="d-img-ph">🍽</div>'; };
    wrap.appendChild(im);
  } else {
    var ph = document.createElement('div');
    ph.className = 'd-img-ph';
    ph.textContent = '🍽';
    wrap.appendChild(ph);
  }
  document.getElementById('d-region').textContent = t.regions[r.region] || r.region;
  document.getElementById('d-name').textContent = r.name;
  document.getElementById('d-addr').textContent = '📍 '+r.addr;
  var tel = document.getElementById('d-tel');
  if(r.tel){ tel.textContent='📞 '+r.tel; tel.href='tel:'+r.tel; tel.style.display='inline-flex'; }
  else { tel.style.display='none'; }
  document.getElementById('d-map-label').textContent = t.mapLabel;
  document.getElementById('d-map-ext').textContent = t.mapExt;
  var mapSrc, mapHref;
  if(r.lat && parseFloat(r.lat) !== 0){
    mapSrc = 'https://maps.google.com/maps?q='+r.lat+','+r.lng+'&z=16&output=embed&hl=ko';
    mapHref = 'https://maps.google.com/maps?q='+r.lat+','+r.lng+'&z=16';
  } else {
    var q = encodeURIComponent(r.name+' '+r.addr);
    mapSrc = 'https://maps.google.com/maps?q='+q+'&z=16&output=embed&hl=ko';
    mapHref = 'https://maps.google.com/maps?q='+q;
  }
  document.getElementById('d-map').src = mapSrc;
  document.getElementById('d-map-ext').href = mapHref;
  // 네이버 예약 링크 (업체명 기반 검색)
  var naverQ = encodeURIComponent(r.name);
  document.getElementById('btn-naver').href = 'https://booking.naver.com/booking/6/bizes?query='+naverQ;
  // 카카오맵 링크
  var kakaoQ = encodeURIComponent(r.name+' '+r.addr);
  document.getElementById('btn-kakao').href = 'https://map.kakao.com/?q='+kakaoQ;
  // 폼 리셋
  document.getElementById('msg-form').style.display = 'none';
  document.getElementById('msg-sent').style.display = 'none';
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-people').value = '';
  document.getElementById('f-msg').value = '';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openMsgForm(){
  var form = document.getElementById('msg-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}
function sendMsg(){
  var name = document.getElementById('f-name').value;
  var date = document.getElementById('f-date').value;
  var people = document.getElementById('f-people').value;
  var msg = document.getElementById('f-msg').value;
  if(!name || !msg){ alert('이름과 문의 내용을 입력해주세요.'); return; }
  // 가상 전송 (실제 연동 시 API 호출로 교체)
  document.getElementById('msg-sent').style.display = 'block';
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-people').value = '';
  document.getElementById('f-msg').value = '';
  setTimeout(function(){ document.getElementById('msg-sent').style.display='none'; document.getElementById('msg-form').style.display='none'; }, 3000);
}
function closeDetail(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('d-map').src='';
}
